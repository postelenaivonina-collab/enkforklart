<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>ENKforklart</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  background: #f6f8fb;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 700px;
  margin: 60px auto;
  background: white;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

h1 {
  margin-top: 0;
}

.subtitle {
  color: #666;
  margin-bottom: 20px;
}

.chatbox {
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  padding: 15px;
  height: 300px;
  overflow-y: auto;
  background: #fafafa;
  margin-bottom: 15px;
  white-space: pre-wrap;
}

.inputrow {
  display: flex;
  gap: 10px;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 14px;
}

button {
  padding: 10px 18px;
  border-radius: 6px;
  border: none;
  background: #2563eb;
  color: white;
  font-weight: 600;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

.user {
  margin-bottom: 10px;
  font-weight: 600;
}

.bot {
  margin-bottom: 20px;
}
</style>
</head>
<body>

<div class="container">

<h1>ENKforklart</h1>
<div class="subtitle">
Få enkle forklaringer på regnskap i enkeltpersonforetak.
</div>

<div id="chat" class="chatbox"></div>

<div class="inputrow">
<input id="input" placeholder="Skriv spørsmålet ditt..." />
<button onclick="send()">Send</button>
</div>

</div>

<script>
async function send() {

  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const message = input.value.trim();
  if (!message) return;

  chat.innerHTML += "<div class='user'>Du: " + message + "</div>";

  input.value = "";

  const res = await fetch("/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message })
  });

  const data = await res.json();

  chat.innerHTML += "<div class='bot'>ENKforklart:\n" + data.reply + "</div>";

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
